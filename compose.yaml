services:
  postgres:
    image: postgres:17
    container_name: grabit-postgres
    environment:
      POSTGRES_DB: grabit
      POSTGRES_USER: grabit
      POSTGRES_PASSWORD: grabit
    ports:
      - "5432:5432"
    volumes:
      - grabit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grabit -d grabit"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  grabit-postgres-data:
