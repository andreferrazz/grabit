app:
  cors:
    allowed-origins: http://localhost:5173

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/grabit
    username: grabit
    password: grabit
  docker:
    compose:
      lifecycle-management: start-and-stop
      file: ../compose.yaml
  flyway:
    locations:
      - classpath:db/migration
      - classpath:db/seed

logging:
  level:
    org.hibernate.SQL: INFO
    com.grabit: DEBUG
